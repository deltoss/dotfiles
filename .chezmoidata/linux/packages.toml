# `distros` scopes an entry to specific distros, matched against the running
# distro's /etc/os-release id (e.g. "cachyos"). Omit it to apply to all distros.
#
###############################################################################
# Package managers / language runtimes (must precede the common bucket)
###############################################################################

[[packages.linux]]
name = "System update"
description = "Updates system by refreshing package databases from configured mirrors, then upgrade all installed packages"
tags = ["all"]
distros = ["cachyos"]
package_type = "commands"
commands = [
  "sudo pacman -Syu --noconfirm",
]

[[packages.linux]]
name = "Rust"
tool = "rustc"
tags = ["all"]
distros = ["cachyos"]
package_type = "commands"
commands = [
  "sudo pacman -S --needed --noconfirm rustup",
  "rustup default stable",
]
postcommands = [
  '$env.PATH = ($env.PATH | prepend ($nu.home-dir | path join ".cargo" "bin"))',
]

[[packages.linux]]
name = "cargo-binstall"
description = "Binary package manager for Rust"
tool = "cargo-binstall"
tags = ["all"]
distros = ["cachyos"]
package_type = "pacman"
id = "cargo-binstall"

[[packages.linux]]
name = "Go"
tool = "go"
tags = ["all"]
distros = ["cachyos"]
package_type = "pacman"
id = "go"
postcommands = [
  '$env.PATH = ($env.PATH | prepend ($nu.home-dir | path join "go" "bin"))',
]

# NONINTERACTIVE=1 keeps the installer from prompting; brew lives at
# /home/linuxbrew/.linuxbrew. Persistent PATH needs the brew shellenv in your
# shell profile; the postcommand only fixes PATH for this run.
[[packages.linux]]
name = "Homebrew"
description = "Homebrew package manager for Linux"
tool = "brew"
tags = ["all"]
distros = ["cachyos"]
package_type = "commands"
commands = [
  'with-env { NONINTERACTIVE: "1" } { http get https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh | bash }',
]
postcommands = [
  '$env.PATH = ($env.PATH | prepend ["/home/linuxbrew/.linuxbrew/bin" "/home/linuxbrew/.linuxbrew/sbin"])',
]

[[packages.linux]]
name = "uv"
description = "Package manager for Python"
tool = "uv"
tags = ["all"]
distros = ["cachyos"]
package_type = "pacman"
id = "uv"
postcommands = [
  '$env.PATH = ($env.PATH | prepend ($nu.home-dir | path join ".local" "bin"))',
]

# Global npm prefix -> ~/.local so `npm install -g` writes to ~/.local/bin (no sudo).
[[packages.linux]]
name = "Node.js"
tool = "node"
tags = ["all"]
distros = ["cachyos"]
package_type = "commands"
commands = [
  "sudo pacman -S --needed --noconfirm nodejs npm",
  'npm config set prefix ($nu.home-dir | path join ".local")',
]
postcommands = [
  '$env.PATH = ($env.PATH | prepend ($nu.home-dir | path join ".local" "bin"))',
]

[[packages.linux]]
name = "dotnet"
tool = "dotnet"
tags = ["all"]
distros = ["cachyos"]
package_type = "pacman"
id = "dotnet-sdk"
postcommands = [
  '$env.PATH = ($env.PATH | prepend ($nu.home-dir | path join ".dotnet" "tools"))',
]

[[packages.linux]]
