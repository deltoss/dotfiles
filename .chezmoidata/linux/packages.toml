###############################################################################
# CLI tools — Go (`go install`, binaries land in ~/go/bin)
###############################################################################

[[packages.linux]]
name = "Fabric"
tool = "fabric"
tags = ["all"]
distros = ["cachyos"]
package_type = "commands"
commands = [
  "go install github.com/danielmiessler/fabric/cmd/fabric@latest",
]
postcommands = [
  # ~/go/bin isn't on PATH yet on a fresh run; prepend it before `fabric --setup`.
  '$env.PATH = ($env.PATH | prepend ($nu.home-dir | path join "go" "bin"))',
  "fabric --setup",
]

