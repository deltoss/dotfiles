###############################################################################
# DisplayLink Driver for KVMs and/or USB-C Hubs with Displays
###############################################################################

[[packages.linux]]
name = "Vultr CLI"
description = "CLI for Vultr VPS & cloud services"
tool = "vultr-cli"
tags = ["personal"]
distros = ["cachyos"]
package_type = "commands"
commands = [
  "paru -S linux-cachyos-headers", # or linux-cachyos-lts-headers / linux-headers, matching whichever kernel `uname -r` shows DKMS needs headers for your exact running kernel or the build silently fails.",
  "paru -S dkms evdi-dkms displaylink", # evdi-dkms builds the kernel module, displaylink installs the userspace binaries.
  "sudo systemctl enable --now displaylink.service", # Enable the service
  "sudo modprobe udl",
  # Troubleshooting:
  # systemctl status displaylink.service
  # If evdi.ko is missing, DKMS failed — check dkms status and journalctl -u dkms.
]

