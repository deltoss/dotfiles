# NOTE: if an X11 espanso build is already installed, the `tool` precheck skips
# this entry — uninstall espanso-x11 first. Re-run the setcap after espanso
# package updates (pacman strips file capabilities on upgrade).
[[packages.linux]]
name = "Espanso"
description = "Cross-platform text expander (Wayland build)"
tool = "espanso"
tags = ["all"]
distros = ["cachyos"]
package_type = "aur"
id = "espanso-wayland"
postcommands = [
  # Wayland build injects text via /dev/uinput, which needs this capability
  "sudo setcap 'cap_dac_override+p' /usr/bin/espanso",
  "espanso service register",
]

