###############################################################################
# GUI apps — Flatpak (Flathub). Both projects ship Flatpak as their main Linux
# install method. `bru` CLI is separate (common bucket).
###############################################################################

# Ensure flatpak + the flathub remote exist before the flatpak apps below.
[[packages.linux]]
name = "Flatpak"
tags = ["all"]
distros = ["cachyos"]
package_type = "commands"
commands = [
  "sudo pacman -S --needed --noconfirm flatpak",
  "sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo",
]

[[packages.linux]]
name = "Pinta"
tags = ["all"]
distros = ["cachyos"]
package_type = "flatpak"
id = "com.github.PintaProject.Pinta"

[[packages.linux]]
name = "Bruno"
tags = ["all"]
distros = ["cachyos"]
package_type = "flatpak"
id = "com.usebruno.Bruno"

[[packages.linux]]
name = "Zen Browser"
tags = ["all"]
distros = ["cachyos"]
package_type = "flatpak"
id = "app.zen_browser.zen"

[[packages.linux]]
name = "ONLYOFFICE Desktop Editors"
tags = ["personal"]
distros = ["cachyos"]
package_type = "flatpak"
id = "org.onlyoffice.desktopeditors"

# Sunshine's Flatpak needs a one-time post-install step (per LizardByte docs).
[[packages.linux]]
name = "Sunshine"
tags = ["personal"]
distros = ["cachyos"]
package_type = "flatpak"
id = "dev.lizardbyte.app.Sunshine"
postcommands = [
  "flatpak run --command=additional-install.sh dev.lizardbyte.app.Sunshine",
]

