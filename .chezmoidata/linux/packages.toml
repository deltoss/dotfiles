# Linux package definitions — target distro: CachyOS (Arch-based).
#
# `distros` scopes an entry to specific distros, matched against the running
# distro's /etc/os-release id (e.g. "cachyos"). Omit it to apply to all distros.
#
# Cross-platform packages installed identically on both OSes (cargo/npm/uv/dotnet
# `commands` + a `tool` check) live in common/packages.toml, NOT here. Their
# MANAGERS are OS-specific, so they are defined here and — because the consumer
# ranges linux-first, common-last — install before the common bucket.

###############################################################################
# Package managers / language runtimes (must precede the common bucket)
###############################################################################

[[packages.linux]]
name = "Rust"
tool = "rustc"
tags = ["all"]
distros = ["cachyos"]
package_type = "commands"
commands = [
  "sudo pacman -S --needed --noconfirm rustup",
  "rustup default stable",
]
postcommands = [
  '$env.PATH = ($env.PATH | prepend ($nu.home-dir | path join ".cargo" "bin"))',
]

[[packages.linux]]
name = "cargo-binstall"
tool = "cargo-binstall"
tags = ["all"]
distros = ["cachyos"]
package_type = "pacman"
id = "cargo-binstall"

[[packages.linux]]
name = "Go"
tool = "go"
tags = ["all"]
distros = ["cachyos"]
package_type = "pacman"
id = "go"
postcommands = [
  '$env.PATH = ($env.PATH | prepend ($nu.home-dir | path join "go" "bin"))',
]

[[packages.linux]]
name = "uv"
tool = "uv"
tags = ["all"]
distros = ["cachyos"]
package_type = "pacman"
id = "uv"
postcommands = [
  '$env.PATH = ($env.PATH | prepend ($nu.home-dir | path join ".local" "bin"))',
]

# Global npm prefix -> ~/.local so `npm install -g` writes to ~/.local/bin (no sudo).
[[packages.linux]]
name = "Node.js"
tool = "node"
tags = ["all"]
distros = ["cachyos"]
package_type = "commands"
commands = [
  "sudo pacman -S --needed --noconfirm nodejs npm",
  'npm config set prefix ($nu.home-dir | path join ".local")',
]
postcommands = [
  '$env.PATH = ($env.PATH | prepend ($nu.home-dir | path join ".local" "bin"))',
]

[[packages.linux]]
name = "dotnet"
tool = "dotnet"
tags = ["all"]
distros = ["cachyos"]
package_type = "pacman"
id = "dotnet-sdk"
postcommands = [
  '$env.PATH = ($env.PATH | prepend ($nu.home-dir | path join ".dotnet" "tools"))',
]

[[packages.linux]]
name = "mise"
tool = "mise"
tags = ["all"]
distros = ["cachyos"]
package_type = "pacman"
id = "mise"

[[packages.linux]]
name = "Deno"
tool = "deno"
