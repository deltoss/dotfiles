# Cross-platform packages, installed on BOTH Windows and Linux.
#
# Each OS's install-packages script ranges over its own array PLUS this common
# array (OS array first, common last). Only put entries here whose install
# command AND idempotency check are identical on both OSes, i.e.
# package_type = "commands" via cargo/npm/uv/dotnet with a `tool` (which-)check.
# winget / apt / choco / scoop entries stay in the per-OS files.
#
# The package MANAGERS (rust, node, …) have OS-specific installs, so they live in
# the per-OS files and run before this bucket, cargo/npm are available here.
# Order matters: cargo-binstall must precede any `cargo binstall` user.

# --- cargo ---
[[packages.common]]
name = "cargo-binstall"
description = "Binary package manager for Rust"
tool = "cargo-binstall"
tags = ["all"]
package_type = "commands"
commands = [
  "cargo install cargo-binstall"
]

[[packages.common]]
name = "ripgrep"
description = "Ripgrep is a line-oriented search tool that recursively searches the current directory for a regex pattern"
tool = "rg"
tags = ["all"]
package_type = "commands"
commands = [
  'cargo binstall -y ripgrep'
]

[[packages.common]]
name = "ast-grep"
description = "CLI tool for code structural search, lint, and rewriting"
tool = "sg"
tags = ["all"]
package_type = "commands"
commands = [
  'cargo binstall -y ast-grep'
]

[[packages.common]]
name = "intelli-shell"
tool = "intelli-shell"
tags = ["all"]
package_type = "commands"
commands = [
  'cargo binstall -y intelli-shell --locked'
]

[[packages.common]]
name = "podlet"
description = "Converts docker syntax or docker-compose.yml files to podman equivalents"
tool = "podlet"
tags = ["all"]
package_type = "commands"
commands = [
  'cargo binstall -y podlet'
]

[[packages.common]]
name = "gittype"
tool = "gittype"
tags = ["all"]
package_type = "commands"
commands = [
  'cargo install gittype'
]

[[packages.common]]
name = "agg"
description = "Used to convert ASCIICasts (i.e. `wezterm record`) to gif formats"
tool = "agg"
tags = ["all"]
package_type = "commands"
commands = [
  'cargo install --git https://github.com/asciinema/agg'
]

[[packages.common]]
name = "zellij"
description = "Terminal multiplexer"
tool = "zellij"
tags = ["all"]
package_type = "commands"
commands = [
  # Extra flags to disable the web client at it was causing issues with Windows
  'cargo install --locked zellij --no-default-features --features plugins_from_target'
]

