[[packages.common]]
name = "Codex"
tool = "codex"
tags = ["all"]
package_type = "commands"
commands = [
  'npm install -g @openai/codex'
]
postcommands = [
  # Configure Serena for codex now that codex exists (Serena installs earlier,
  # from the Linux list, before codex was available). Guarded so it is a no-op
  # where Serena is not installed.
  'if (which serena | is-not-empty) { serena setup codex }',
]

[[packages.common]]
name = "Codex ACP"
