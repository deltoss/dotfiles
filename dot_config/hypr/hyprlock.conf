# ~/.config/hypr/hyprlock.conf
# Styled after https://github.com/MrVivekRajan/Hyprlock-Styles (Style-2)
# Assets: ~/.config/hypr/hyprlock/{hypr.png,foreground.png}
# Fonts installed to ~/.local/share/fonts/hyprlock-style2/

general {
    hide_cursor        = true
    ignore_empty_input = true
    fail_timeout       = 3000
}

auth {
    pam {
        enabled = true
        module  = hyprlock
    }
}

animations {
    enabled   = true
    bezier    = smooth, 0.16, 1, 0.3, 1
    animation = fadeIn, 1, 4, smooth
    animation = fadeOut, 1, 4, smooth
    animation = inputFieldDots, 1, 2, smooth
}

# BACKGROUND
background {
    monitor           =
    path              = ~/.config/hypr/hyprlock/hypr.png
    blur_passes       = 0
    contrast          = 0.8916
    brightness        = 0.8172
    vibrancy          = 0.1696
    vibrancy_darkness = 0.0
}

# TIME
label {
    monitor     =
    text        = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color       = rgba(216, 222, 233, .7)
    font_size   = 160
    font_family = steelfish outline regular
    position    = 0, 370
    halign      = center
    valign      = center
}

# DAY, MONTH DATE
label {
    monitor     =
    text        = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color       = rgba(216, 222, 233, .7)
    font_size   = 28
    font_family = SF Pro Display Bold
    position    = 0, 490
    halign      = center
    valign      = center
}

# FOREGROUND CHARACTER
image {
    monitor     =
    path        = ~/.config/hypr/hyprlock/foreground.png
    size        = 700
    border_size = 0
    rounding    = 0
    rotate      = 0
    position    = 0, -66
    halign      = center
    valign      = center
}

# USER
label {
    monitor     =
    text        = cmd[] whoami
    color       = rgba(216, 222, 233, 0.80)
    font_size   = 18
    font_family = SF Pro Display Bold
    position    = 0, -180
    halign      = center
    valign      = center
}

# INPUT FIELD
input-field {
    monitor           =
    size              = 300, 60
    outline_thickness = 2
    dots_size         = 0.2
    dots_spacing      = 0.2
    dots_center       = true
    outer_color       = rgba(255, 255, 255, 0)
    inner_color       = rgba(255, 255, 255, 0.1)
    font_color        = rgb(200, 200, 200)
    font_family       = SF Pro Display Bold
    fade_on_empty     = false
    hide_input        = false
    placeholder_text  = <i><span foreground="##ffffff99">🔒 Enter Pass</span></i>
    fail_text         = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position          = 0, -250
    halign            = center
    valign            = center
}
