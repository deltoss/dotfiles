
[metadata]
name = "nu-history"
description = "A channel to select from your nu history"

[source]
# For .txt history
# command = "nu -n --no-std-lib -c 'open $nu.history-path | lines | uniq | reverse | to text'"
# For .sqlite history
command = "nu -n --no-std-lib -c 'open ($nu.history-path | str replace .txt .sqlite3) | get history.command_line | uniq | reverse | to text'"
no_sort = true
frecency = false