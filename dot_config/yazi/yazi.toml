[mgr]
show_hidden = true

[opener]
edit = [
  { run = "nu ~/.config/yazi/scripts/zellij-edit.nu %s", block = true, desc = "Zellij Edit" },
  { run = "$EDITOR %s", block = true, desc = "Editor", for = "unix" },
  { run = "%EDITOR% %s", block = true, desc = "Editor", for = "windows" },
  { run = '$SHELL', block = true, desc = "Terminal", for = "unix" },
  { run = 'nu.exe', block = true, desc = "Terminal", for = "windows" },
]
audacity = [
  { run = 'audacity %s', orphan = true, desc = "Audacity", for = "unix" },
]

[open]
prepend_rules = [
	{ mime = "audio/*", use = [ "play", "audacity", "reveal" ] },
]
append_rules = [
	{ url = "*", use = [ "edit", "open", "reveal"] },
]